<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f7faf8">
  <title>CalLog - Personal Calorie Logger</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7faf8;
      --surface: #ffffff;
      --surface-2: #eef5f0;
      --surface-3: #e4ece7;
      --text: #17211c;
      --muted: #65746c;
      --line: #d7e0da;
      --accent: #16895e;
      --accent-2: #0b6d7b;
      --danger: #c84b4b;
      --warning: #bd7b13;
      --ok: #16895e;
      --shadow: 0 14px 36px rgba(24, 44, 35, 0.10);
      --radius: 8px;
      --nav-h: 74px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #101714;
      --surface: #17211d;
      --surface-2: #1f2d27;
      --surface-3: #2a3832;
      --text: #edf4ef;
      --muted: #a7b8ae;
      --line: #314039;
      --accent: #4fc28d;
      --accent-2: #57b7c8;
      --danger: #f06d6d;
      --warning: #f0b35c;
      --ok: #4fc28d;
      --shadow: 0 18px 44px rgba(0, 0, 0, 0.36);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      letter-spacing: 0;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    .app-shell {
      min-height: 100vh;
      padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 15;
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .topbar-inner {
      width: min(1120px, 100%);
      margin: 0 auto;
      min-height: 64px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: var(--surface-2);
      color: var(--accent);
      font-weight: 800;
      border: 1px solid var(--line);
    }

    .brand-title {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .brand-subtitle {
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .main {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 16px;
    }

    .page-grid {
      display: grid;
      gap: 16px;
    }

    .home-grid,
    .profile-grid,
    .history-grid,
    .summary-grid,
    .weight-grid {
      display: grid;
      gap: 16px;
    }

    @media (min-width: 820px) {
      .home-grid,
      .profile-grid,
      .history-grid,
      .summary-grid,
      .weight-grid {
        grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
        align-items: start;
      }

      .span-2 { grid-column: span 2; }
    }

    .band {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .band-head {
      padding: 16px 16px 0;
    }

    .band-body {
      padding: 16px;
    }

    .section-title {
      margin: 0;
      font-size: 1rem;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .section-note {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .hero-panel {
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 16%, var(--surface)), var(--surface));
      border: 1px solid color-mix(in srgb, var(--accent) 28%, var(--line));
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .hero-date {
      color: var(--muted);
      font-size: 0.94rem;
    }

    .kcal-line {
      margin: 8px 0 0;
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 8px;
    }

    .kcal-main {
      font-size: clamp(2rem, 8vw, 3.25rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .kcal-target {
      color: var(--muted);
      font-size: 1rem;
    }

    .remaining {
      margin: 8px 0 0;
      color: var(--muted);
      font-weight: 650;
    }

    .progress {
      width: 100%;
      height: 12px;
      margin-top: 16px;
      background: var(--surface-3);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .progress-bar {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 180ms ease;
    }

    .progress-bar.over {
      background: linear-gradient(90deg, var(--warning), var(--danger));
    }

    .quick-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: var(--radius);
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--line);
      font-weight: 750;
      text-decoration: none;
    }

    .btn:hover { border-color: color-mix(in srgb, var(--accent) 40%, var(--line)); }

    .btn-primary {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
      min-height: 56px;
      font-size: 1.05rem;
    }

    .btn-danger {
      color: var(--danger);
      background: color-mix(in srgb, var(--danger) 10%, var(--surface));
      border-color: color-mix(in srgb, var(--danger) 30%, var(--line));
    }

    .btn-ghost {
      background: transparent;
      box-shadow: none;
    }

    .btn-small {
      min-height: 36px;
      padding: 7px 10px;
      font-size: 0.88rem;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      min-height: 42px;
      padding: 0;
      flex: 0 0 auto;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    @media (min-width: 560px) {
      .stats.three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    .stat-card {
      min-height: 86px;
      padding: 13px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.25;
    }

    .stat-value {
      margin-top: 8px;
      font-size: 1.35rem;
      line-height: 1;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .item {
      display: grid;
      gap: 7px;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .item-title {
      font-weight: 780;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .item-meta {
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.4;
    }

    .item-kcal {
      white-space: nowrap;
      font-weight: 800;
      color: var(--accent);
    }

    .empty-state {
      padding: 20px;
      background: var(--surface-2);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      text-align: center;
      line-height: 1.55;
    }

    .form-grid {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label,
    .field-label {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 44px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }

    textarea {
      min-height: 82px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
    }

    .two-col {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .three-col {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    @media (max-width: 430px) {
      .two-col,
      .three-col {
        grid-template-columns: 1fr;
      }
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      padding: 4px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .segmented button {
      min-height: 38px;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      font-weight: 760;
    }

    .segmented button.active {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .pill-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 700;
    }

    .pill.active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .pill.warning {
      color: var(--warning);
      border-color: color-mix(in srgb, var(--warning) 40%, var(--line));
      background: color-mix(in srgb, var(--warning) 10%, var(--surface));
    }

    .error-box {
      display: none;
      padding: 10px 12px;
      color: var(--danger);
      background: color-mix(in srgb, var(--danger) 10%, var(--surface));
      border: 1px solid color-mix(in srgb, var(--danger) 34%, var(--line));
      border-radius: var(--radius);
      line-height: 1.45;
    }

    .error-box.show { display: block; }

    .bottom-nav {
      position: fixed;
      z-index: 20;
      left: 0;
      right: 0;
      bottom: 0;
      min-height: calc(var(--nav-h) + env(safe-area-inset-bottom));
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      background: color-mix(in srgb, var(--surface) 94%, transparent);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .bottom-nav-inner {
      width: min(780px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
    }

    .nav-btn {
      min-height: 54px;
      display: grid;
      place-items: center;
      gap: 2px;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 750;
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      border: 1px solid transparent;
      font-size: 0.78rem;
    }

    .nav-btn.active {
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 9%, transparent);
    }

    .nav-btn.active .nav-icon {
      border-color: color-mix(in srgb, var(--accent) 35%, var(--line));
      background: var(--surface);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: flex-end;
      justify-content: center;
      background: rgba(6, 12, 9, 0.54);
      padding: 14px;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      width: min(680px, 100%);
      max-height: min(92vh, 820px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    @media (min-width: 720px) {
      .modal-backdrop { align-items: center; }
    }

    .modal-header,
    .modal-footer {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .modal-footer {
      border-top: 1px solid var(--line);
      border-bottom: 0;
    }

    .modal-body {
      padding: 14px;
      overflow: auto;
    }

    .suggestions {
      display: grid;
      gap: 7px;
      margin-top: 8px;
    }

    .suggestion {
      text-align: left;
      padding: 10px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--text);
    }

    .suggestion .name {
      font-weight: 780;
      line-height: 1.35;
    }

    .suggestion .meta {
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 2px;
    }

    .addon-row {
      display: grid;
      grid-template-columns: auto 1fr minmax(104px, 132px);
      gap: 9px;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid var(--line);
    }

    .addon-row:last-child { border-bottom: 0; }

    .checkbox {
      width: 22px;
      height: 22px;
      accent-color: var(--accent);
    }

    .inline-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .table-list {
      display: grid;
      gap: 10px;
    }

    .manage-row {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
    }

    @media (min-width: 620px) {
      .manage-row {
        grid-template-columns: minmax(0, 1.2fr) minmax(110px, 150px) auto;
        align-items: center;
      }
    }

    .calendar-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }

    .dow {
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 800;
      text-align: center;
      padding: 4px 0;
    }

    .day-btn {
      aspect-ratio: 1 / 1;
      min-height: 42px;
      border-radius: var(--radius);
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      gap: 2px;
      font-weight: 760;
    }

    .day-btn.muted {
      opacity: 0.42;
    }

    .day-btn.today {
      border-color: var(--accent);
    }

    .day-btn.selected {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .day-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--muted);
    }

    .day-dot.ok { background: var(--ok); }
    .day-dot.over { background: var(--danger); }
    .day-dot.under { background: var(--warning); }

    .chart {
      width: 100%;
      min-height: 190px;
      display: flex;
      align-items: end;
      gap: 4px;
      padding: 12px;
      border: 1px solid var(--line);
      background: var(--surface-2);
      border-radius: var(--radius);
      overflow-x: auto;
    }

    .bar-wrap {
      min-width: 16px;
      height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 5px;
    }

    .bar {
      width: 100%;
      min-height: 2px;
      border-radius: 5px 5px 2px 2px;
      background: var(--accent);
    }

    .bar.over { background: var(--danger); }
    .bar.under { background: var(--warning); }

    .bar-label {
      color: var(--muted);
      font-size: 0.65rem;
      min-height: 14px;
    }

    .line-chart {
      width: 100%;
      min-height: 210px;
      border: 1px solid var(--line);
      background: var(--surface-2);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .line-chart svg {
      width: 100%;
      height: 210px;
      display: block;
    }

    .drawer-toggle {
      display: none;
    }

    @media (min-width: 1040px) {
      .app-shell {
        padding-left: 92px;
        padding-bottom: 0;
      }

      .bottom-nav {
        top: 0;
        right: auto;
        width: 92px;
        min-height: 100vh;
        padding: 12px;
        border-top: 0;
        border-right: 1px solid var(--line);
      }

      .bottom-nav-inner {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .nav-btn {
        min-height: 66px;
      }
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="modalRoot" class="modal-backdrop" aria-hidden="true"></div>

  <script>
    const STORAGE_KEY = "callog.v1";

    const starterFoodNames = [
      "ชาเย็น",
      "ข้าวไข่ดาว 3 ฟอง",
      "ข้าวผัดปลาหมึก + ไข่ดาว",
      "ข้าวผัดไก่ + ไข่ดาว",
      "ข้าวผัดผงกะหรี่ไก่ + ไข่เจียว",
      "ช็อกโกแลตเย็น",
      "ช็อกโกแลตปั่น",
      "ชาเย็นปั่น",
      "ข้าวไข่เจียว 2 ฟอง",
      "ชาดำเย็น",
      "ข้าวแกงกะหรี่ไก่กรอบ + ไข่ข้น",
      "บะหมี่กึ่งสำเร็จรูปจายาแบบกระป๋อง"
    ];

    const starterAddonNames = [
      "ไข่ดาว",
      "ไข่ดาว 2 ฟอง",
      "ไข่เจียว",
      "ไข่ข้น",
      "เพิ่มข้าว"
    ];

    const tabMeta = [
      { id: "home", label: "Home", icon: "H" },
      { id: "history", label: "History", icon: "D" },
      { id: "summary", label: "Summary", icon: "S" },
      { id: "weight", label: "Weight", icon: "W" },
      { id: "profile", label: "Profile", icon: "P" }
    ];

    const activityMultipliers = {
      sedentary: 1.2,
      light: 1.375,
      moderate: 1.55,
      very: 1.725,
      extra: 1.9
    };

    const activityLabels = {
      sedentary: "นั่งทำงานเป็นหลัก",
      light: "ขยับบ้าง",
      moderate: "ออกกำลังปานกลาง",
      very: "ออกกำลังหนัก",
      extra: "หนักมาก"
    };

    const goalLabels = {
      lose: "ลดน้ำหนัก",
      maintain: "คงน้ำหนัก",
      gain: "เพิ่มน้ำหนัก"
    };

    const mealLabels = {
      breakfast: "Breakfast",
      lunch: "Lunch",
      dinner: "Dinner",
      evening: "Evening",
      late_night: "Late Night"
    };

    const runtime = {
      tab: "home",
      selectedDate: dateKey(new Date()),
      calendarMonth: monthKey(new Date()),
      summaryMonth: monthKey(new Date()),
      foodFilter: "",
      addonFilter: "",
      weightEditId: null,
      modal: null
    };

    let state = loadState();

    function uid(prefix) {
      if (window.crypto && crypto.randomUUID) return prefix + "-" + crypto.randomUUID();
      return prefix + "-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 9);
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    function dateKey(date) {
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    }

    function monthKey(date) {
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}`;
    }

    function timeKey(date) {
      return `${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function parseDateKey(value) {
      const [year, month, day] = value.split("-").map(Number);
      return new Date(year, month - 1, day || 1);
    }

    function formatThaiDate(value) {
      return parseDateKey(value).toLocaleDateString("th-TH", {
        weekday: "short",
        day: "numeric",
        month: "short",
        year: "numeric"
      });
    }

    function formatMonth(value) {
      const [year, month] = value.split("-").map(Number);
      return new Date(year, month - 1, 1).toLocaleDateString("th-TH", {
        month: "long",
        year: "numeric"
      });
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function numberOrNull(value) {
      const num = Number(value);
      return Number.isFinite(num) && value !== "" ? num : null;
    }

    function round(value) {
      return Math.round(Number(value) || 0);
    }

    function loadState() {
      let saved = null;
      try {
        saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
      } catch (error) {
        saved = null;
      }

      const base = {
        profile: null,
        foods: [],
        foodAddons: [],
        mealLogs: [],
        weightLogs: [],
        settings: {
          theme: "light",
          deletedStarterFoods: [],
          deletedStarterAddons: []
        }
      };

      const merged = {
        ...base,
        ...(saved || {}),
        settings: { ...base.settings, ...((saved && saved.settings) || {}) }
      };

      merged.foods = Array.isArray(merged.foods) ? merged.foods : [];
      merged.foodAddons = Array.isArray(merged.foodAddons) ? merged.foodAddons : [];
      merged.mealLogs = Array.isArray(merged.mealLogs) ? merged.mealLogs : [];
      merged.weightLogs = Array.isArray(merged.weightLogs) ? merged.weightLogs : [];

      seedStarterData(merged);
      return merged;
    }

    function seedStarterData(target) {
      const now = nowIso();
      const deletedFoods = new Set(target.settings.deletedStarterFoods || []);
      starterFoodNames.forEach((name) => {
        const exists = target.foods.some((food) => food.name === name);
        if (!exists && !deletedFoods.has(name)) {
          target.foods.push({
            id: uid("food"),
            name,
            defaultCalories: null,
            usageCount: 0,
            lastUsedAt: null,
            isStarter: true,
            createdAt: now,
            updatedAt: now
          });
        }
      });

      const deletedAddons = new Set(target.settings.deletedStarterAddons || []);
      starterAddonNames.forEach((name) => {
        const exists = target.foodAddons.some((addon) => addon.name === name);
        if (!exists && !deletedAddons.has(name)) {
          target.foodAddons.push({
            id: uid("addon"),
            name,
            calories: null,
            usageCount: 0,
            lastUsedAt: null,
            createdAt: now,
            updatedAt: now,
            isStarter: true
          });
        }
      });
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function applyTheme() {
      document.documentElement.dataset.theme = state.settings.theme || "light";
      const meta = document.querySelector("meta[name='theme-color']");
      if (meta) meta.setAttribute("content", state.settings.theme === "dark" ? "#101714" : "#f7faf8");
    }

    function setTheme(theme) {
      state.settings.theme = theme;
      saveState();
      applyTheme();
      render();
    }

    function inferMealPeriod(time) {
      const hour = Number(String(time || "00:00").split(":")[0]);
      if (hour >= 5 && hour <= 10) return "breakfast";
      if (hour >= 11 && hour <= 14) return "lunch";
      if (hour >= 15 && hour <= 18) return "dinner";
      if (hour >= 19 && hour <= 22) return "evening";
      return "late_night";
    }

    function calculateProfile(input) {
      const age = Number(input.age);
      const weightKg = Number(input.weightKg);
      const heightCm = Number(input.heightCm);
      const genderOffset = input.gender === "female" ? -161 : 5;
      const bmr = 10 * weightKg + 6.25 * heightCm - 5 * age + genderOffset;
      const tdee = bmr * activityMultipliers[input.activityLevel];
      const adjustment = input.goal === "lose" ? -500 : input.goal === "gain" ? 300 : 0;
      return {
        ...input,
        age,
        weightKg,
        heightCm,
        bmr: round(bmr),
        tdee: round(tdee),
        dailyCalorieTarget: round(tdee + adjustment)
      };
    }

    function targetCalories() {
      return state.profile ? state.profile.dailyCalorieTarget : null;
    }

    function logsForDate(date) {
      return state.mealLogs
        .filter((log) => log.date === date)
        .sort((a, b) => `${b.date} ${b.time}`.localeCompare(`${a.date} ${a.time}`));
    }

    function totalForDate(date) {
      return logsForDate(date).reduce((sum, log) => sum + Number(log.totalCalories || 0), 0);
    }

    function recentFoods(limit = 5) {
      return [...state.foods]
        .filter((food) => food.defaultCalories !== null && food.usageCount > 0)
        .sort((a, b) => {
          const last = String(b.lastUsedAt || "").localeCompare(String(a.lastUsedAt || ""));
          if (last !== 0) return last;
          return (b.usageCount || 0) - (a.usageCount || 0);
        })
        .slice(0, limit);
    }

    function sortedFoodSuggestions(query, limit = 8) {
      const q = String(query || "").trim().toLowerCase();
      return [...state.foods]
        .filter((food) => !q || food.name.toLowerCase().includes(q))
        .sort((a, b) => {
          const aRecent = a.lastUsedAt ? new Date(a.lastUsedAt).getTime() : 0;
          const bRecent = b.lastUsedAt ? new Date(b.lastUsedAt).getTime() : 0;
          if (aRecent !== bRecent) return bRecent - aRecent;
          if ((a.usageCount || 0) !== (b.usageCount || 0)) return (b.usageCount || 0) - (a.usageCount || 0);
          if ((a.defaultCalories !== null) !== (b.defaultCalories !== null)) return a.defaultCalories !== null ? -1 : 1;
          return a.name.localeCompare(b.name, "th");
        })
        .slice(0, limit);
    }

    function upsertFoodFromLog(foodId, foodName, calories) {
      const now = nowIso();
      let food = foodId ? state.foods.find((item) => item.id === foodId) : null;
      if (!food) {
        food = state.foods.find((item) => item.name.trim().toLowerCase() === foodName.trim().toLowerCase());
      }

      if (food) {
        food.name = foodName.trim();
        food.defaultCalories = Number(calories);
        food.usageCount = (food.usageCount || 0) + 1;
        food.lastUsedAt = now;
        food.updatedAt = now;
        return food.id;
      }

      const created = {
        id: uid("food"),
        name: foodName.trim(),
        defaultCalories: Number(calories),
        usageCount: 1,
        lastUsedAt: now,
        isStarter: false,
        createdAt: now,
        updatedAt: now
      };
      state.foods.push(created);
      return created.id;
    }

    function touchSelectedAddons(selectedAddons) {
      const now = nowIso();
      selectedAddons.forEach((selected) => {
        const addon = state.foodAddons.find((item) => item.id === selected.addonId);
        if (!addon) return;
        addon.calories = Number(selected.calories);
        addon.usageCount = (addon.usageCount || 0) + 1;
        addon.lastUsedAt = now;
        addon.updatedAt = now;
      });
    }

    function openQuickLog(options = {}) {
      const editing = options.log || null;
      const now = new Date();
      runtime.modal = {
        id: editing ? editing.id : null,
        date: editing ? editing.date : (options.date || dateKey(now)),
        time: editing ? editing.time : timeKey(now),
        mealPeriod: editing ? editing.mealPeriod : inferMealPeriod(timeKey(now)),
        foodId: editing ? (editing.foodId || null) : (options.food ? options.food.id : null),
        foodName: editing ? editing.foodName : (options.food ? options.food.name : ""),
        baseCalories: editing ? String(editing.baseCalories || "") : (options.food && options.food.defaultCalories !== null ? String(options.food.defaultCalories) : ""),
        selectedAddons: editing ? [...(editing.addons || [])] : [],
        note: editing ? (editing.note || "") : "",
        errors: [],
        shouldFocusFood: true
      };
      renderModal();
    }

    function closeQuickLog() {
      runtime.modal = null;
      renderModal();
    }

    function selectedAddonTotal() {
      if (!runtime.modal) return 0;
      return runtime.modal.selectedAddons.reduce((sum, addon) => sum + (Number(addon.calories) || 0), 0);
    }

    function modalBaseCalories() {
      if (!runtime.modal) return 0;
      return Number(runtime.modal.baseCalories) || 0;
    }

    function modalTotalCalories() {
      return modalBaseCalories() + selectedAddonTotal();
    }

    function saveMealFromModal() {
      const modal = runtime.modal;
      if (!modal) return;
      const errors = [];
      const foodName = modal.foodName.trim();
      const baseCalories = Number(modal.baseCalories);

      if (!modal.date) errors.push("กรุณาเลือกวันที่");
      if (!modal.time) errors.push("กรุณาเลือกเวลา");
      if (!foodName) errors.push("กรุณากรอกชื่ออาหาร");
      if (!Number.isFinite(baseCalories) || baseCalories <= 0) errors.push("กรุณากรอกแคลอรีอาหารหลักเป็นตัวเลขบวก");
      modal.selectedAddons.forEach((addon) => {
        const calories = Number(addon.calories);
        if (!Number.isFinite(calories) || calories <= 0) {
          errors.push(`กรุณากรอกแคลอรีของ ${addon.name}`);
        }
      });

      if (errors.length) {
        modal.errors = errors;
        renderModal();
        return;
      }

      const foodId = upsertFoodFromLog(modal.foodId, foodName, baseCalories);
      const normalizedAddons = modal.selectedAddons.map((addon) => ({
        addonId: addon.addonId,
        name: addon.name,
        calories: Number(addon.calories)
      }));
      touchSelectedAddons(normalizedAddons);

      const now = nowIso();
      const payload = {
        id: modal.id || uid("meal"),
        date: modal.date,
        time: modal.time,
        mealPeriod: modal.mealPeriod || inferMealPeriod(modal.time),
        foodId,
        foodName,
        baseCalories: Number(baseCalories),
        addons: normalizedAddons,
        totalCalories: Number(baseCalories) + normalizedAddons.reduce((sum, addon) => sum + Number(addon.calories || 0), 0),
        note: modal.note.trim(),
        createdAt: modal.id ? (state.mealLogs.find((log) => log.id === modal.id)?.createdAt || now) : now,
        updatedAt: now
      };

      const existingIndex = state.mealLogs.findIndex((log) => log.id === payload.id);
      if (existingIndex >= 0) state.mealLogs[existingIndex] = payload;
      else state.mealLogs.push(payload);

      runtime.selectedDate = payload.date;
      saveState();
      closeQuickLog();
      render();
    }

    function deleteMeal(id) {
      if (!confirm("ลบรายการอาหารนี้?")) return;
      state.mealLogs = state.mealLogs.filter((log) => log.id !== id);
      saveState();
      render();
    }

    function saveProfileFromForm(form) {
      const data = Object.fromEntries(new FormData(form).entries());
      const errors = [];
      if (!Number(data.age) || Number(data.age) <= 0) errors.push("Age ต้องเป็นตัวเลขบวก");
      if (!Number(data.weightKg) || Number(data.weightKg) <= 0) errors.push("Weight ต้องเป็นตัวเลขบวก");
      if (!Number(data.heightCm) || Number(data.heightCm) <= 0) errors.push("Height ต้องเป็นตัวเลขบวก");
      if (!data.activityLevel) errors.push("กรุณาเลือก activity level");
      if (!data.goal) errors.push("กรุณาเลือก goal");
      const box = document.getElementById("profileErrors");
      if (errors.length) {
        box.textContent = errors.join(" / ");
        box.classList.add("show");
        return;
      }

      const now = nowIso();
      state.profile = {
        id: state.profile?.id || uid("profile"),
        ...calculateProfile(data),
        createdAt: state.profile?.createdAt || now,
        updatedAt: now
      };
      saveState();
      render();
    }

    function foodStatusText(food) {
      const calories = food.defaultCalories === null ? "ยังไม่มี kcal" : `${food.defaultCalories} kcal`;
      const usage = `${food.usageCount || 0} ครั้ง`;
      return `${calories} · ใช้ ${usage}`;
    }

    function saveFoodRow(id) {
      const row = document.querySelector(`[data-food-row="${id}"]`);
      const food = state.foods.find((item) => item.id === id);
      if (!row || !food) return;
      const name = row.querySelector("[data-food-name]").value.trim();
      const caloriesValue = row.querySelector("[data-food-calories]").value;
      const calories = numberOrNull(caloriesValue);
      if (!name) return alert("กรุณากรอกชื่ออาหาร");
      if (caloriesValue !== "" && (!Number.isFinite(calories) || calories <= 0)) return alert("แคลอรีต้องเป็นตัวเลขบวก");
      food.name = name;
      food.defaultCalories = calories;
      food.updatedAt = nowIso();
      saveState();
      render();
    }

    function deleteFood(id) {
      const food = state.foods.find((item) => item.id === id);
      if (!food || !confirm(`ลบ "${food.name}" ออกจากคลังอาหาร?`)) return;
      if (food.isStarter) {
        state.settings.deletedStarterFoods = [...new Set([...(state.settings.deletedStarterFoods || []), food.name])];
      }
      state.foods = state.foods.filter((item) => item.id !== id);
      saveState();
      render();
    }

    function addCustomAddon() {
      const nameEl = document.getElementById("newAddonName");
      const kcalEl = document.getElementById("newAddonCalories");
      const name = nameEl.value.trim();
      const calories = numberOrNull(kcalEl.value);
      if (!name) return alert("กรุณากรอกชื่อ add-on");
      if (kcalEl.value !== "" && (!Number.isFinite(calories) || calories <= 0)) return alert("แคลอรีต้องเป็นตัวเลขบวก");
      const now = nowIso();
      state.foodAddons.push({
        id: uid("addon"),
        name,
        calories,
        usageCount: 0,
        lastUsedAt: null,
        isStarter: false,
        createdAt: now,
        updatedAt: now
      });
      saveState();
      render();
    }

    function saveAddonRow(id) {
      const row = document.querySelector(`[data-addon-row="${id}"]`);
      const addon = state.foodAddons.find((item) => item.id === id);
      if (!row || !addon) return;
      const name = row.querySelector("[data-addon-name]").value.trim();
      const caloriesValue = row.querySelector("[data-addon-calories]").value;
      const calories = numberOrNull(caloriesValue);
      if (!name) return alert("กรุณากรอกชื่อ add-on");
      if (caloriesValue !== "" && (!Number.isFinite(calories) || calories <= 0)) return alert("แคลอรีต้องเป็นตัวเลขบวก");
      addon.name = name;
      addon.calories = calories;
      addon.updatedAt = nowIso();
      saveState();
      render();
    }

    function deleteAddon(id) {
      const addon = state.foodAddons.find((item) => item.id === id);
      if (!addon || !confirm(`ลบ "${addon.name}" ออกจาก add-ons?`)) return;
      if (addon.isStarter) {
        state.settings.deletedStarterAddons = [...new Set([...(state.settings.deletedStarterAddons || []), addon.name])];
      }
      state.foodAddons = state.foodAddons.filter((item) => item.id !== id);
      saveState();
      render();
    }

    function saveWeightFromForm(form) {
      const data = Object.fromEntries(new FormData(form).entries());
      const weightKg = Number(data.weightKg);
      if (!data.date) return alert("กรุณาเลือกวันที่");
      if (!Number.isFinite(weightKg) || weightKg <= 0) return alert("น้ำหนักต้องเป็นตัวเลขบวก");

      const now = nowIso();
      const payload = {
        id: runtime.weightEditId || uid("weight"),
        date: data.date,
        weightKg,
        note: String(data.note || "").trim(),
        createdAt: runtime.weightEditId ? (state.weightLogs.find((log) => log.id === runtime.weightEditId)?.createdAt || now) : now,
        updatedAt: now
      };

      const existingIndex = state.weightLogs.findIndex((log) => log.id === payload.id);
      if (existingIndex >= 0) state.weightLogs[existingIndex] = payload;
      else state.weightLogs.push(payload);
      runtime.weightEditId = null;
      saveState();
      render();
    }

    function editWeight(id) {
      runtime.weightEditId = id;
      render();
    }

    function deleteWeight(id) {
      if (!confirm("ลบข้อมูลน้ำหนักนี้?")) return;
      state.weightLogs = state.weightLogs.filter((log) => log.id !== id);
      if (runtime.weightEditId === id) runtime.weightEditId = null;
      saveState();
      render();
    }

    function resetAllData() {
      if (!confirm("ล้างข้อมูล CalLog ทั้งหมดในเบราว์เซอร์นี้?")) return;
      localStorage.removeItem(STORAGE_KEY);
      state = loadState();
      runtime.tab = "home";
      runtime.selectedDate = dateKey(new Date());
      runtime.calendarMonth = monthKey(new Date());
      runtime.summaryMonth = monthKey(new Date());
      runtime.weightEditId = null;
      applyTheme();
      saveState();
      render();
    }

    function monthDays(month) {
      const [year, monthNum] = month.split("-").map(Number);
      const days = new Date(year, monthNum, 0).getDate();
      return Array.from({ length: days }, (_, index) => `${year}-${pad(monthNum)}-${pad(index + 1)}`);
    }

    function dayStatus(date) {
      const total = totalForDate(date);
      const target = targetCalories();
      if (!total) return "none";
      if (!target) return "under";
      const delta = total - target;
      if (Math.abs(delta) <= 100) return "ok";
      return delta > 0 ? "over" : "under";
    }

    function calendarDates(month) {
      const [year, monthNum] = month.split("-").map(Number);
      const first = new Date(year, monthNum - 1, 1);
      const start = new Date(first);
      start.setDate(first.getDate() - first.getDay());
      return Array.from({ length: 42 }, (_, index) => {
        const date = new Date(start);
        date.setDate(start.getDate() + index);
        return {
          key: dateKey(date),
          day: date.getDate(),
          inMonth: date.getMonth() === monthNum - 1
        };
      });
    }

    function monthlyStats(month) {
      const days = monthDays(month);
      const totals = days.map((day) => ({ day, total: totalForDate(day), status: dayStatus(day) }));
      const logged = totals.filter((item) => item.total > 0);
      const total = logged.reduce((sum, item) => sum + item.total, 0);
      return {
        days,
        totals,
        loggedDays: logged.length,
        total,
        average: logged.length ? Math.round(total / logged.length) : 0,
        within: logged.filter((item) => item.status === "ok").length,
        over: logged.filter((item) => item.status === "over").length,
        under: logged.filter((item) => item.status === "under").length
      };
    }

    function render() {
      applyTheme();
      const root = document.getElementById("app");
      root.innerHTML = `
        <div class="app-shell">
          ${renderTopbar()}
          <main class="main">${renderCurrentTab()}</main>
          ${renderBottomNav()}
        </div>
      `;
      bindAppEvents();
      renderModal();
    }

    function renderTopbar() {
      return `
        <header class="topbar">
          <div class="topbar-inner">
            <div class="brand" aria-label="CalLog">
              <div class="brand-mark">CL</div>
              <div>
                <h1 class="brand-title">CalLog</h1>
                <div class="brand-subtitle">Open, log food, close</div>
              </div>
            </div>
            <button class="btn btn-small icon-btn" data-action="toggle-theme" title="Toggle dark mode" aria-label="Toggle dark mode">
              <span aria-hidden="true">${state.settings.theme === "dark" ? "☼" : "☾"}</span>
            </button>
          </div>
        </header>
      `;
    }

    function renderBottomNav() {
      return `
        <nav class="bottom-nav" aria-label="Main navigation">
          <div class="bottom-nav-inner">
            ${tabMeta.map((tab) => `
              <button class="nav-btn ${runtime.tab === tab.id ? "active" : ""}" data-tab="${tab.id}" aria-current="${runtime.tab === tab.id ? "page" : "false"}">
                <span class="nav-icon">${tab.icon}</span>
                <span>${tab.label}</span>
              </button>
            `).join("")}
          </div>
        </nav>
      `;
    }

    function renderCurrentTab() {
      if (runtime.tab === "history") return renderHistory();
      if (runtime.tab === "summary") return renderSummary();
      if (runtime.tab === "weight") return renderWeight();
      if (runtime.tab === "profile") return renderProfile();
      return renderHome();
    }

    function renderHome() {
      const today = dateKey(new Date());
      const logs = logsForDate(today);
      const total = totalForDate(today);
      const target = targetCalories();
      const pct = target ? Math.min(100, Math.round((total / target) * 100)) : 0;
      const remaining = target === null
        ? "ตั้งค่าโปรไฟล์เพื่อคำนวณเป้าหมายต่อวัน"
        : total <= target
          ? `เหลือ ${target - total} kcal`
          : `เกิน ${total - target} kcal`;
      const recent = recentFoods(5);

      return `
        <div class="home-grid">
          <section class="hero-panel">
            <div class="hero-date">${formatThaiDate(today)}</div>
            <div class="kcal-line">
              <div class="kcal-main">${total.toLocaleString()}</div>
              <div class="kcal-target">/ ${target ? target.toLocaleString() : "-"} kcal</div>
            </div>
            <div class="remaining">${remaining}</div>
            <div class="progress" aria-label="Daily calorie progress">
              <div class="progress-bar ${target && total > target ? "over" : ""}" style="width:${pct}%"></div>
            </div>
            <div class="quick-actions">
              <button class="btn btn-primary" data-action="open-log">+ Add Food</button>
            </div>
          </section>

          <section class="band">
            <div class="band-head">
              <h2 class="section-title">Recent Foods</h2>
              <p class="section-note">แตะเพื่อบันทึกซ้ำอย่างเร็ว</p>
            </div>
            <div class="band-body">
              ${recent.length ? `
                <div class="list">
                  ${recent.map((food) => `
                    <button class="suggestion" data-action="quick-food" data-food-id="${food.id}">
                      <div class="name">${escapeHtml(food.name)}</div>
                      <div class="meta">${food.defaultCalories} kcal · ใช้ ${food.usageCount || 0} ครั้ง</div>
                    </button>
                  `).join("")}
                </div>
              ` : `<div class="empty-state">ยังไม่มีอาหารที่บันทึก<br>อาหารที่คุณกรอกจะถูกจำไว้ใช้ครั้งต่อไป</div>`}
            </div>
          </section>

          <section class="band span-2">
            <div class="band-head">

        <div class="chart" aria-label="Daily calorie chart">
          ${stats.totals.map((item, index) => {

            const status = dayStatus(item.day);
            return `
              <div class="bar-wrap" title="${item.day}: ${item.total} kcal">

      const change = first && latest ? (latest.weightKg - first.weightKg) : 0;

      return `
        <div class="weight-grid">

            <div class="band-body form-grid">
              <div class="stats three">
                <div class="stat-card">
                  <div class="stat-label">Current</div>
                  <div class="stat-value">${latest ? `${latest.weightKg} kg` : "-"}</div>
                </div>
                <div class="stat-card">
                  <div class="stat-label">Starting</div>
                  <div class="stat-value">${first ? `${first.weightKg} kg` : "-"}</div>
                </div>
                <div class="stat-card">
                  <div class="stat-label">Change</div>
                  <div class="stat-value">${latest && first ? `${change > 0 ? "+" : ""}${change.toFixed(1)} kg` : "-"}</div>

              ${chartLogs.length ? renderWeightChart(chartLogs) : `<div class="empty-state">ยังไม่มีข้อมูลน้ำหนัก<br>เพิ่มน้ำหนักครั้งแรกเพื่อเริ่มติดตาม</div>`}
            </div>
          </section>
          <section class="band span-2">

                      </div>
                    </article>
                  `).join("")}
                </div>
              ` : `<div class="empty-state">ยังไม่มีข้อมูลน้ำหนัก<br>เพิ่มน้ำหนักครั้งแรกเพื่อเริ่มติดตาม</div>`}
            </div>
          </section>
        </div>
      `;
    }

    function renderWeightChart(logs) {
      const values = logs.map((log) => Number(log.weightKg));
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = Math.max(1, max - min);
      const points = logs.map((log, index) => {
        const x = logs.length === 1 ? 50 : 8 + (index / (logs.length - 1)) * 84;
        const y = 86 - ((log.weightKg - min) / range) * 68;
        return `${x},${y}`;
      }).join(" ");
      return `
        <div class="line-chart" aria-label="Weight trend chart">
          <svg viewBox="0 0 100 100" role="img">
            <line x1="8" y1="86" x2="92" y2="86" stroke="var(--line)" stroke-width="0.8" />
            <line x1="8" y1="18" x2="8" y2="86" stroke="var(--line)" stroke-width="0.8" />
            <polyline points="${points}" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
            ${logs.map((log, index) => {
              const point = points.split(" ")[index].split(",");
              return `<circle cx="${point[0]}" cy="${point[1]}" r="2.2" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.4"><title>${log.date}: ${log.weightKg} kg</title></circle>`;
            }).join("")}
            <text x="9" y="13" fill="var(--muted)" font-size="4">${max.toFixed(1)} kg</text>
            <text x="9" y="96" fill="var(--muted)" font-size="4">${min.toFixed(1)} kg</text>
          </svg>
        </div>
      `;
    }

      const q = runtime.foodFilter.trim().toLowerCase();

        .filter((food) => !q || food.name.toLowerCase().includes(q))
        .sort((a, b) => {

          return a.name.localeCompare(b.name, "th");
        });
      if (!foods.length) {
        return `<div class="empty-state">ยังไม่มีอาหารที่บันทึก<br>อาหารที่คุณกรอกจะถูกจำไว้ใช้ครั้งต่อไป</div>`;

              <div class="field">
                <label for="foodName">Food name</label>
                <input id="foodName" autocomplete="off" value="${escapeHtml(modal.foodName)}" data-modal-field="foodName" placeholder="พิมพ์ชื่ออาหาร">
                <div class="suggestions" id="foodSuggestions">
                  ${suggestions.map((food) => `
                    <button class="suggestion" data-action="pick-food" data-food-id="${food.id}">
                      <div class="name">${escapeHtml(food.name)}</div>
                      <div class="meta">${food.defaultCalories === null ? "ยังไม่มี kcal" : `${food.defaultCalories} kcal`} · ใช้ ${food.usageCount || 0} ครั้ง${food.isStarter ? " · starter" : ""}</div>
                    </button>
                  `).join("")}
                </div>
              </div>
              <div class="field">
                <label for="baseCalories">Calories</label>
                <input id="baseCalories" type="number" min="1" inputmode="numeric" value="${escapeHtml(modal.baseCalories)}" data-modal-field="baseCalories" placeholder="kcal">
              </div>
              <div class="field">
                <span class="field-label">Optional add-ons</span>
                <div class="band" style="box-shadow:none;">
                  <div class="band-body" style="padding: 6px 12px;">
                    ${state.foodAddons.length ? state.foodAddons.map((addon) => renderAddonPickerRow(addon)).join("") : `<div class="empty-state">ยังไม่มี add-on</div>`}
                  </div>
                </div>
              </div>
              <div class="field">
                <label for="logNote">Note</label>
                <textarea id="logNote" data-modal-field="note" placeholder="optional">${escapeHtml(modal.note)}</textarea>
              </div>
            </div>
          </div>
          <footer class="modal-footer">
            <div class="item-kcal">${total || 0} kcal</div>
            <div class="inline-actions">
              <button class="btn" data-action="close-log">Cancel</button>
              <button class="btn btn-primary" data-action="save-log">Save</button>
            </div>
          </footer>
        </section>
      `;
      bindModalEvents();
      const foodInput = document.getElementById("foodName");
      if (foodInput && modal.shouldFocusFood) {
        foodInput.focus();
        modal.shouldFocusFood = false;
      }
    }

    function renderAddonPickerRow(addon) {
      const selected = runtime.modal.selectedAddons.find((item) => item.addonId === addon.id);
      const calories = selected ? selected.calories : addon.calories;
      return `
        <div class="addon-row">
          <input class="checkbox" type="checkbox" ${selected ? "checked" : ""} data-action="toggle-addon" data-addon-id="${addon.id}" aria-label="Select ${escapeHtml(addon.name)}">
          <div>
            <div class="item-title">${escapeHtml(addon.name)}</div>
            <div class="item-meta">${addon.calories === null ? "ใส่ kcal เมื่อเลือกใช้ครั้งแรก" : `${addon.calories} kcal`}</div>
          </div>
          <input type="number" min="1" inputmode="numeric" value="${calories === null || calories === undefined ? "" : calories}" placeholder="kcal" data-addon-calories="${addon.id}" ${selected ? "" : "disabled"}>
        </div>
      `;
    }

    function bindAppEvents() {
      document.querySelectorAll("[data-tab]").forEach((button) => {
        button.addEventListener("click", () => {
          runtime.tab = button.dataset.tab;
          render();
        });
      });

      document.querySelectorAll("[data-action]").forEach((el) => {
        const action = el.dataset.action;
        if ([
          "close-log",
          "save-log",
          "pick-food",
          "toggle-addon",
          "select-date",
          "summary-month",
          "profile-gender"
        ].includes(action)) return;
        el.addEventListener("click", (event) => {
          if (action === "toggle-theme") setTheme(state.settings.theme === "dark" ? "light" : "dark");
          if (action === "open-log") openQuickLog();
          if (action === "open-log-date") openQuickLog({ date: runtime.selectedDate });
          if (action === "quick-food") {
            const food = state.foods.find((item) => item.id === el.dataset.foodId);
            if (food) openQuickLog({ food });
          }
          if (action === "edit-log") {
            const log = state.mealLogs.find((item) => item.id === el.dataset.logId);
            if (log) openQuickLog({ log });
          }
          if (action === "delete-log") deleteMeal(el.dataset.logId);
          if (action === "prev-month") moveCalendar(-1);
          if (action === "next-month") moveCalendar(1);
          if (action === "calendar-date") {
            runtime.selectedDate = el.dataset.date;
            runtime.calendarMonth = monthKey(parseDateKey(el.dataset.date));
            render();
          }
          if (action === "save-food") saveFoodRow(el.dataset.foodId);
          if (action === "delete-food") deleteFood(el.dataset.foodId);
          if (action === "add-addon") addCustomAddon();
          if (action === "save-addon") saveAddonRow(el.dataset.addonId);
          if (action === "delete-addon") deleteAddon(el.dataset.addonId);
          if (action === "edit-weight") editWeight(el.dataset.weightId);
          if (action === "delete-weight") deleteWeight(el.dataset.weightId);
          if (action === "cancel-weight-edit") {
            runtime.weightEditId = null;
            render();
          }
          if (action === "reset-data") resetAllData();
          event.preventDefault();
        });
      });

      const selectedDate = document.querySelector("[data-action='select-date']");
      if (selectedDate) {
        selectedDate.addEventListener("change", () => {
          runtime.selectedDate = selectedDate.value || dateKey(new Date());
          runtime.calendarMonth = monthKey(parseDateKey(runtime.selectedDate));
          render();
        });
      }

      const summaryMonth = document.querySelector("[data-action='summary-month']");
      if (summaryMonth) {
        summaryMonth.addEventListener("change", () => {
          runtime.summaryMonth = summaryMonth.value || monthKey(new Date());
          render();
        });
      }

      const profileForm = document.getElementById("profileForm");
      if (profileForm) {
        profileForm.addEventListener("submit", (event) => {
          event.preventDefault();
          saveProfileFromForm(profileForm);
        });
      }

      document.querySelectorAll("[data-action='profile-gender']").forEach((button) => {
        button.addEventListener("click", () => {
          const hidden = document.querySelector("input[name='gender']");
          if (hidden) hidden.value = button.dataset.value;
          document.querySelectorAll("[data-action='profile-gender']").forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
        });
      });

      const foodFilter = document.getElementById("foodFilter");
      if (foodFilter) {
        foodFilter.addEventListener("input", () => {
          runtime.foodFilter = foodFilter.value;
          render();
          requestAnimationFrame(() => {
            const next = document.getElementById("foodFilter");
            if (next) {
              next.focus();
              next.setSelectionRange(next.value.length, next.value.length);
            }
          });
        });
      }

      const addonFilter = document.getElementById("addonFilter");
      if (addonFilter) {
        addonFilter.addEventListener("input", () => {
          runtime.addonFilter = addonFilter.value;
          render();
          requestAnimationFrame(() => {
            const next = document.getElementById("addonFilter");
            if (next) {
              next.focus();
              next.setSelectionRange(next.value.length, next.value.length);
            }
          });
        });
      }

      const weightForm = document.getElementById("weightForm");
      if (weightForm) {
        weightForm.addEventListener("submit", (event) => {
          event.preventDefault();
          saveWeightFromForm(weightForm);
        });
      }
    }

    function bindModalEvents() {
      const root = document.getElementById("modalRoot");
      root.querySelectorAll("[data-action='close-log']").forEach((button) => button.addEventListener("click", closeQuickLog));
      const save = root.querySelector("[data-action='save-log']");
      if (save) save.addEventListener("click", saveMealFromModal);

      root.querySelectorAll("[data-modal-field]").forEach((field) => {
        field.addEventListener("input", () => {
          const key = field.dataset.modalField;
          runtime.modal[key] = field.value;
          if (key === "time") {
            runtime.modal.mealPeriod = inferMealPeriod(field.value);
            const period = document.getElementById("mealPeriod");
            if (period) period.value = runtime.modal.mealPeriod;
          }
          if (key === "foodName") {
            runtime.modal.foodId = null;
            updateSuggestionList(field.value);
          }
          updateModalTotalText();
        });
        field.addEventListener("change", () => {
          const key = field.dataset.modalField;
          runtime.modal[key] = field.value;
          if (key === "time") runtime.modal.mealPeriod = inferMealPeriod(field.value);
          updateModalTotalText();
        });
      });

      root.querySelectorAll("[data-action='pick-food']").forEach((button) => {
        button.addEventListener("click", () => {
          const food = state.foods.find((item) => item.id === button.dataset.foodId);
          if (!food || !runtime.modal) return;
          runtime.modal.foodId = food.id;
          runtime.modal.foodName = food.name;
          runtime.modal.baseCalories = food.defaultCalories === null ? "" : String(food.defaultCalories);
          renderModal();
        });
      });

      root.querySelectorAll("[data-action='toggle-addon']").forEach((checkbox) => {
        checkbox.addEventListener("change", () => {
          const addon = state.foodAddons.find((item) => item.id === checkbox.dataset.addonId);
          if (!addon || !runtime.modal) return;
          const exists = runtime.modal.selectedAddons.find((item) => item.addonId === addon.id);
          if (checkbox.checked && !exists) {
            runtime.modal.selectedAddons.push({
              addonId: addon.id,
              name: addon.name,
              calories: addon.calories === null ? "" : addon.calories
            });
          }
          if (!checkbox.checked) {
            runtime.modal.selectedAddons = runtime.modal.selectedAddons.filter((item) => item.addonId !== addon.id);
          }
          renderModal();
        });
      });

      root.querySelectorAll("[data-addon-calories]").forEach((input) => {
        input.addEventListener("input", () => {
          const selected = runtime.modal.selectedAddons.find((item) => item.addonId === input.dataset.addonCalories);
          if (selected) {
            selected.calories = input.value;
            updateModalTotalText();
          }
        });
      });
    }

    function updateSuggestionList(query) {
      const container = document.getElementById("foodSuggestions");
      if (!container) return;
      container.innerHTML = sortedFoodSuggestions(query, query ? 6 : 7).map((food) => `
        <button class="suggestion" data-action="pick-food" data-food-id="${food.id}">
          <div class="name">${escapeHtml(food.name)}</div>
          <div class="meta">${food.defaultCalories === null ? "ยังไม่มี kcal" : `${food.defaultCalories} kcal`} · ใช้ ${food.usageCount || 0} ครั้ง${food.isStarter ? " · starter" : ""}</div>
        </button>
      `).join("");
      container.querySelectorAll("[data-action='pick-food']").forEach((button) => {
        button.addEventListener("click", () => {
          const food = state.foods.find((item) => item.id === button.dataset.foodId);
          if (!food || !runtime.modal) return;
          runtime.modal.foodId = food.id;
          runtime.modal.foodName = food.name;
          runtime.modal.baseCalories = food.defaultCalories === null ? "" : String(food.defaultCalories);
          renderModal();
        });
      });
    }

    function updateModalTotalText() {
      if (!runtime.modal) return;
      const modal = document.getElementById("modalRoot");
      const totals = modal.querySelectorAll(".item-kcal, .modal-header .section-note");
      totals.forEach((item) => {
        if (item.classList.contains("section-note")) {
          item.textContent = `${mealLabels[runtime.modal.mealPeriod] || ""} · Total ${modalTotalCalories() || 0} kcal`;
        } else {
          item.textContent = `${modalTotalCalories() || 0} kcal`;
        }
      });
    }

    function moveCalendar(delta) {
      const [year, month] = runtime.calendarMonth.split("-").map(Number);
      const date = new Date(year, month - 1 + delta, 1);
      runtime.calendarMonth = monthKey(date);
      render();
    }

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && runtime.modal) closeQuickLog();
    });

    applyTheme();
    saveState();
    render();
  </script>
</body>
</html>
