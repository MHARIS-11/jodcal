<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f7faf8">
  <title>CalLog - Personal Calorie Logger</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7faf8;
      --surface: #ffffff;
      --surface-2: #eef5f0;
      --surface-3: #e4ece7;
      --text: #17211c;
      --muted: #65746c;
      --line: #d7e0da;
      --accent: #16895e;
      --accent-2: #0b6d7b;
      --danger: #c84b4b;
      --warning: #bd7b13;
      --ok: #16895e;
      --shadow: 0 14px 36px rgba(24, 44, 35, 0.10);
      --radius: 8px;
      --nav-h: 74px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #101714;
      --surface: #17211d;
      --surface-2: #1f2d27;
      --surface-3: #2a3832;
      --text: #edf4ef;
      --muted: #a7b8ae;
      --line: #314039;
      --accent: #4fc28d;
      --accent-2: #57b7c8;
      --danger: #f06d6d;
      --warning: #f0b35c;
      --ok: #4fc28d;
      --shadow: 0 18px 44px rgba(0, 0, 0, 0.36);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      letter-spacing: 0;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    .app-shell {
      min-height: 100vh;
      padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 15;
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .topbar-inner {
      width: min(1120px, 100%);
      margin: 0 auto;
      min-height: 64px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: var(--surface-2);
      color: var(--accent);
      font-weight: 800;
      border: 1px solid var(--line);
    }

    .brand-title {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .brand-subtitle {
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .main {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 16px;
    }

    .page-grid {
      display: grid;
      gap: 16px;
    }

    .home-grid,
    .profile-grid,
    .history-grid,
    .summary-grid,
    .weight-grid,
    .exercise-grid {
      display: grid;
      gap: 16px;
    }

    @media (min-width: 820px) {
      .home-grid,
      .profile-grid,
      .history-grid,
      .summary-grid,
      .weight-grid,
      .exercise-grid {
        grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
        align-items: start;
      }

      .span-2 { grid-column: span 2; }
    }

    .band {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .band-head {
      padding: 16px 16px 0;
    }

    .band-body {
      padding: 16px;
    }

    .band-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 16px 0;
    }

    .band-title-row .band-head {
      padding: 0;
    }

    .collapsible {
      overflow: hidden;
    }

    .collapsible > summary {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      cursor: pointer;
      font-weight: 800;
      list-style: none;
    }

    .collapsible > summary::-webkit-details-marker {
      display: none;
    }

    .collapsible > summary::after {
      content: "+";
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--muted);
      border: 1px solid var(--line);
      flex: 0 0 auto;
    }

    .collapsible[open] > summary::after {
      content: "-";
    }

    .collapsible .band-body {
      border-top: 1px solid var(--line);
    }

    .section-title {
      margin: 0;
      font-size: 1rem;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .section-note {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .hero-panel {
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 16%, var(--surface)), var(--surface));
      border: 1px solid color-mix(in srgb, var(--accent) 28%, var(--line));
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .hero-date {
      color: var(--muted);
      font-size: 0.94rem;
    }

    .kcal-line {
      margin: 8px 0 0;
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 8px;
    }

    .kcal-main {
      font-size: clamp(2rem, 8vw, 3.25rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .kcal-target {
      color: var(--muted);
      font-size: 1rem;
    }

    .remaining {
      margin: 8px 0 0;
      color: var(--muted);
      font-weight: 650;
    }

    .progress {
      width: 100%;
      height: 12px;
      margin-top: 16px;
      background: var(--surface-3);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .progress-bar {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 180ms ease;
    }

    .progress-bar.over {
      background: linear-gradient(90deg, var(--warning), var(--danger));
    }

    .quick-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: var(--radius);
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--line);
      font-weight: 750;
      text-decoration: none;
    }

    .btn:hover { border-color: color-mix(in srgb, var(--accent) 40%, var(--line)); }

    .btn-primary {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
      min-height: 56px;
      font-size: 1.05rem;
    }

    .btn-danger {
      color: var(--danger);
      background: color-mix(in srgb, var(--danger) 10%, var(--surface));
      border-color: color-mix(in srgb, var(--danger) 30%, var(--line));
    }

    .btn-ghost {
      background: transparent;
      box-shadow: none;
    }

    .btn-small {
      min-height: 36px;
      padding: 7px 10px;
      font-size: 0.88rem;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      min-height: 42px;
      padding: 0;
      flex: 0 0 auto;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    @media (min-width: 560px) {
      .stats.three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    .stat-card {
      min-height: 86px;
      padding: 13px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.25;
    }

    .stat-value {
      margin-top: 8px;
      font-size: 1.35rem;
      line-height: 1;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .item {
      display: grid;
      gap: 7px;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .compact-list {
      gap: 7px;
    }

    .compact-item {
      padding: 9px 10px;
      box-shadow: none;
    }

    .compact-item .item-row {
      align-items: center;
    }

    .compact-item .item-title {
      font-size: 0.94rem;
      line-height: 1.25;
    }

    .compact-item .item-meta {
      font-size: 0.78rem;
    }

    .compact-item .item-kcal {
      font-size: 0.92rem;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .item-title {
      font-weight: 780;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .item-meta {
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.4;
    }

    .item-kcal {
      white-space: nowrap;
      font-weight: 800;
      color: var(--accent);
    }

    .empty-state {
      padding: 20px;
      background: var(--surface-2);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      text-align: center;
      line-height: 1.55;
    }

    .form-grid {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label,
    .field-label {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 44px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }

    textarea {
      min-height: 82px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
    }

    .two-col {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .three-col {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    @media (max-width: 430px) {
      .two-col,
      .three-col {
        grid-template-columns: 1fr;
      }
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      padding: 4px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .segmented button {
      min-height: 38px;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      font-weight: 760;
    }

    .segmented button.active {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .segmented.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .food-set {
      display: grid;
      gap: 10px;
    }

    .set-row {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(82px, 0.55fr) minmax(72px, 0.42fr) minmax(76px, 0.42fr) 38px;
      gap: 8px;
      align-items: end;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-2);
    }

    .set-row input {
      min-height: 40px;
      padding: 8px 9px;
    }

    .set-subtotal {
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      color: var(--accent);
      font-weight: 800;
      white-space: nowrap;
    }

    @media (max-width: 620px) {
      .set-row {
        grid-template-columns: minmax(0, 1fr) minmax(86px, 0.5fr) minmax(72px, 0.36fr) 38px;
      }

      .set-subtotal {
        grid-column: 1 / -1;
        justify-content: flex-start;
      }
    }

    .pill-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 700;
    }

    .pill.active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .pill.warning {
      color: var(--warning);
      border-color: color-mix(in srgb, var(--warning) 40%, var(--line));
      background: color-mix(in srgb, var(--warning) 10%, var(--surface));
    }

    .error-box {
      display: none;
      padding: 10px 12px;
      color: var(--danger);
      background: color-mix(in srgb, var(--danger) 10%, var(--surface));
      border: 1px solid color-mix(in srgb, var(--danger) 34%, var(--line));
      border-radius: var(--radius);
      line-height: 1.45;
    }

    .error-box.show { display: block; }

    .bottom-nav {
      position: fixed;
      z-index: 20;
      left: 0;
      right: 0;
      bottom: 0;
      min-height: calc(var(--nav-h) + env(safe-area-inset-bottom));
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      background: color-mix(in srgb, var(--surface) 94%, transparent);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .bottom-nav-inner {
      width: min(780px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
    }

    .nav-btn {
      min-height: 54px;
      display: grid;
      place-items: center;
      gap: 2px;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 750;
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      border: 1px solid transparent;
      font-size: 0.78rem;
    }

    .nav-btn.active {
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 9%, transparent);
    }

    .nav-btn.active .nav-icon {
      border-color: color-mix(in srgb, var(--accent) 35%, var(--line));
      background: var(--surface);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: flex-end;
      justify-content: center;
      background: rgba(6, 12, 9, 0.54);
      padding: 14px;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      width: min(680px, 100%);
      max-height: min(92vh, 820px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    @media (min-width: 720px) {
      .modal-backdrop { align-items: center; }
    }

    .modal-header,
    .modal-footer {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .modal-footer {
      border-top: 1px solid var(--line);
      border-bottom: 0;
    }

    .modal-body {
      padding: 14px;
      overflow: auto;
    }

    .suggestions {
      display: grid;
      gap: 7px;
      margin-top: 8px;
    }

    .suggestion {
      text-align: left;
      padding: 10px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--text);
    }

    .suggestion .name {
      font-weight: 780;
      line-height: 1.35;
    }

    .suggestion .meta {
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 2px;
    }

    .addon-row {
      display: grid;
      grid-template-columns: auto 1fr minmax(104px, 132px);
      gap: 9px;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid var(--line);
    }

    .addon-row:last-child { border-bottom: 0; }

    .checkbox {
      width: 22px;
      height: 22px;
      accent-color: var(--accent);
    }

    .inline-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .table-list {
      display: grid;
      gap: 10px;
    }

    .manage-row {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
    }

    @media (min-width: 620px) {
      .manage-row {
        grid-template-columns: minmax(0, 1.2fr) minmax(110px, 150px) auto;
        align-items: center;
      }
    }

    .calendar-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }

    .dow {
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 800;
      text-align: center;
      padding: 4px 0;
    }

    .day-btn {
      aspect-ratio: 1 / 1;
      min-height: 42px;
      border-radius: var(--radius);
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      gap: 2px;
      font-weight: 760;
    }

    .day-btn.muted {
      opacity: 0.42;
    }

    .day-btn.today {
      border-color: var(--accent);
    }

    .day-btn.selected {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .day-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--muted);
    }

    .day-dot.ok { background: var(--ok); }
    .day-dot.over { background: var(--danger); }
    .day-dot.under { background: var(--warning); }

    .chart {
      position: relative;
      width: 100%;
      min-height: 190px;
      display: flex;
      align-items: end;
      gap: 4px;
      padding: 12px;
      border: 1px solid var(--line);
      background: var(--surface-2);
      border-radius: var(--radius);
      overflow-x: auto;
    }

    .chart-line {
      position: absolute;
      left: 12px;
      right: 12px;
      height: 0;
      border-top: 2px dashed var(--accent-2);
      pointer-events: none;
      z-index: 2;
    }

    .chart-line.tdee {
      border-top-style: solid;
      border-top-color: var(--warning);
    }

    .chart-line-label {
      position: absolute;
      right: 0;
      top: -18px;
      padding: 2px 6px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .chart-legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 750;
    }

    .legend-mark {
      width: 18px;
      height: 0;
      display: inline-block;
      border-top: 2px dashed var(--accent-2);
      transform: translateY(-3px);
    }

    .legend-mark.tdee {
      border-top-style: solid;
      border-top-color: var(--warning);
    }

    .bar-wrap {
      min-width: 16px;
      height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 5px;
    }

    .bar {
      position: relative;
      z-index: 3;
      width: 100%;
      min-height: 2px;
      border-radius: 5px 5px 2px 2px;
      background: var(--accent);
    }

    .exercise-chart {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      background: var(--surface-2);
      border-radius: var(--radius);
    }

    .exercise-bar-row {
      display: grid;
      grid-template-columns: minmax(92px, 0.8fr) minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      font-size: 0.86rem;
    }

    .exercise-bar-label {
      color: var(--text);
      font-weight: 750;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .exercise-bar-track {
      height: 12px;
      border-radius: 999px;
      background: var(--surface-3);
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .exercise-bar {
      height: 100%;
      min-width: 2px;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent-2), var(--accent));
    }

    .exercise-bar-value {
      color: var(--accent);
      font-weight: 800;
      white-space: nowrap;
    }

    .bar.over { background: var(--danger); }
    .bar.under { background: var(--warning); }

    .bar-label {
      color: var(--muted);
      font-size: 0.65rem;
      min-height: 14px;
    }

    .line-chart {
      width: 100%;
      min-height: 210px;
      border: 1px solid var(--line);
      background: var(--surface-2);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .line-chart svg {
      width: 100%;
      height: 210px;
      display: block;
    }

    .drawer-toggle {
      display: none;
    }

    @media (min-width: 1040px) {
      .app-shell {
        padding-left: 92px;
        padding-bottom: 0;
      }

      .bottom-nav {
        top: 0;
        right: auto;
        width: 92px;
        min-height: 100vh;
        padding: 12px;
        border-top: 0;
        border-right: 1px solid var(--line);
      }

      .bottom-nav-inner {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .nav-btn {
        min-height: 66px;
      }
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="modalRoot" class="modal-backdrop" aria-hidden="true"></div>

  <script>
    const STORAGE_KEY = "callog.v1";

    const starterFoodNames = [
      "ชาเย็น",
      "ข้าวไข่ดาว 3 ฟอง",
      "ข้าวผัดปลาหมึก + ไข่ดาว",
      "ข้าวผัดไก่ + ไข่ดาว",
      "ข้าวผัดผงกะหรี่ไก่ + ไข่เจียว",
      "ช็อกโกแลตเย็น",
      "ช็อกโกแลตปั่น",
      "ชาเย็นปั่น",
      "ข้าวไข่เจียว 2 ฟอง",
      "ชาดำเย็น",
      "ข้าวแกงกะหรี่ไก่กรอบ + ไข่ข้น",
      "บะหมี่กึ่งสำเร็จรูปจายาแบบกระป๋อง"
    ];

    const starterAddonNames = [
      "ไข่ดาว",
      "ไข่ดาว 2 ฟอง",
      "ไข่เจียว",
      "ไข่ข้น",
      "เพิ่มข้าว"
    ];

    const tabMeta = [
      { id: "home", label: "Home", icon: "H" },
      { id: "history", label: "History", icon: "D" },
      { id: "summary", label: "Summary", icon: "S" },
      { id: "exercise", label: "Exercise", icon: "E" },
      { id: "profile", label: "Profile", icon: "P" }
    ];

    const activityMultipliers = {
      sedentary: 1.2,
      light: 1.375,
      moderate: 1.55,
      very: 1.725,
      extra: 1.9
    };

    const activityLabels = {
      sedentary: "นั่งทำงานเป็นหลัก",
      light: "ขยับบ้าง",
      moderate: "ออกกำลังปานกลาง",
      very: "ออกกำลังหนัก",
      extra: "หนักมาก"
    };

    const goalLabels = {
      lose: "ลดน้ำหนัก",
      maintain: "คงน้ำหนัก",
      gain: "เพิ่มน้ำหนัก"
    };

    const mealLabels = {
      breakfast: "Breakfast",
      lunch: "Lunch",
      dinner: "Dinner",
      evening: "Evening",
      late_night: "Late Night"
    };

    const weightNoteLabels = {
      normal: "ปกติ",
      work: "ทำงาน",
      after_food: "หลังอาหาร",
      other: "อื่นๆ"
    };

    const activitySuggestions = [
      "วิ่ง",
      "ปั่นจักรยาน",
      "วิ่ง + เดิน",
      "เล่นบาส",
      "เล่นแบด",
      "เล่นบอล",
      "เวทเทรนนิ่ง",
      "เดินเร็ว"
    ];

    const runtime = {
      tab: "home",
      selectedDate: dateKey(new Date()),
      calendarMonth: monthKey(new Date()),
      summaryMonth: monthKey(new Date()),
      exerciseMonth: monthKey(new Date()),
      foodFilter: "",
      addonFilter: "",
      historyEditMode: false,
      modal: null,
      weightModal: null
    };

    let state = loadState();

    function uid(prefix) {
      if (window.crypto && crypto.randomUUID) return prefix + "-" + crypto.randomUUID();
      return prefix + "-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 9);
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    function dateKey(date) {
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    }

    function monthKey(date) {
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}`;
    }

    function timeKey(date) {
      return `${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function parseDateKey(value) {
      const [year, month, day] = value.split("-").map(Number);
      return new Date(year, month - 1, day || 1);
    }

    function formatThaiDate(value) {
      return parseDateKey(value).toLocaleDateString("th-TH", {
        weekday: "short",
        day: "numeric",
        month: "short",
        year: "numeric"
      });
    }

    function formatMonth(value) {
      const [year, month] = value.split("-").map(Number);
      return new Date(year, month - 1, 1).toLocaleDateString("th-TH", {
        month: "long",
        year: "numeric"
      });
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function numberOrNull(value) {
      const num = Number(value);
      return Number.isFinite(num) && value !== "" ? num : null;
    }

    function round(value) {
      return Math.round(Number(value) || 0);
    }

    function loadState() {
      let saved = null;
      try {
        saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
      } catch (error) {
        saved = null;
      }

      const base = {
        profile: null,
        foods: [],
        foodAddons: [],
        mealLogs: [],
        weightLogs: [],
        exerciseLogs: [],
        settings: {
          theme: "light",
          deletedStarterFoods: [],
          deletedStarterAddons: []
        }
      };

      const merged = {
        ...base,
        ...(saved || {}),
        settings: { ...base.settings, ...((saved && saved.settings) || {}) }
      };

      merged.foods = Array.isArray(merged.foods) ? merged.foods : [];
      merged.foodAddons = Array.isArray(merged.foodAddons) ? merged.foodAddons : [];
      merged.mealLogs = Array.isArray(merged.mealLogs) ? merged.mealLogs : [];
      merged.weightLogs = Array.isArray(merged.weightLogs) ? merged.weightLogs : [];
      merged.exerciseLogs = Array.isArray(merged.exerciseLogs) ? merged.exerciseLogs : [];

      seedStarterData(merged);
      return merged;
    }

    function seedStarterData(target) {
      const now = nowIso();
      const deletedFoods = new Set(target.settings.deletedStarterFoods || []);
      starterFoodNames.forEach((name) => {
        const exists = target.foods.some((food) => food.name === name);
        if (!exists && !deletedFoods.has(name)) {
          target.foods.push({
            id: uid("food"),
            name,
            defaultCalories: null,
            usageCount: 0,
            lastUsedAt: null,
            isStarter: true,
            createdAt: now,
            updatedAt: now
          });
        }
      });

      const deletedAddons = new Set(target.settings.deletedStarterAddons || []);
      starterAddonNames.forEach((name) => {
        const exists = target.foodAddons.some((addon) => addon.name === name);
        if (!exists && !deletedAddons.has(name)) {
          target.foodAddons.push({
            id: uid("addon"),
            name,
            calories: null,
            usageCount: 0,
            lastUsedAt: null,
            createdAt: now,
            updatedAt: now,
            isStarter: true
          });
        }
      });
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function applyTheme() {
      document.documentElement.dataset.theme = state.settings.theme || "light";
      const meta = document.querySelector("meta[name='theme-color']");
      if (meta) meta.setAttribute("content", state.settings.theme === "dark" ? "#101714" : "#f7faf8");
    }

    function setTheme(theme) {
      state.settings.theme = theme;
      saveState();
      applyTheme();
      render();
    }

    function inferMealPeriod(time) {
      const hour = Number(String(time || "00:00").split(":")[0]);
      if (hour >= 5 && hour <= 10) return "breakfast";
      if (hour >= 11 && hour <= 14) return "lunch";
      if (hour >= 15 && hour <= 18) return "dinner";
      if (hour >= 19 && hour <= 22) return "evening";
      return "late_night";
    }

    function calculateProfile(input) {
      const age = Number(input.age);
      const weightKg = Number(input.weightKg);
      const heightCm = Number(input.heightCm);
      const genderOffset = input.gender === "female" ? -161 : 5;
      const bmr = 10 * weightKg + 6.25 * heightCm - 5 * age + genderOffset;
      const tdee = bmr * activityMultipliers[input.activityLevel];
      const adjustment = input.goal === "lose" ? -500 : input.goal === "gain" ? 300 : 0;
      return {
        ...input,
        age,
        weightKg,
        heightCm,
        bmr: round(bmr),
        tdee: round(tdee),
        dailyCalorieTarget: round(tdee + adjustment)
      };
    }

    function targetCalories() {
      return state.profile ? state.profile.dailyCalorieTarget : null;
    }

    function logsForDate(date) {
      return state.mealLogs
        .filter((log) => log.date === date)
        .sort((a, b) => `${b.date} ${b.time}`.localeCompare(`${a.date} ${a.time}`));
    }

    function totalForDate(date) {
      return logsForDate(date).reduce((sum, log) => sum + Number(log.totalCalories || 0), 0);
    }

    function totalFoodForMonth(month) {
      return monthDays(month).reduce((sum, day) => sum + totalForDate(day), 0);
    }

    function exerciseLogsForMonth(month) {
      return state.exerciseLogs
        .filter((log) => String(log.date || "").startsWith(month))
        .sort((a, b) => `${b.date} ${b.time || "00:00"}`.localeCompare(`${a.date} ${a.time || "00:00"}`));
    }

    function totalExerciseForMonth(month) {
      return exerciseLogsForMonth(month).reduce((sum, log) => sum + Number(log.caloriesBurned || 0), 0);
    }

    function monthDashboardStats(month) {
      const eaten = totalFoodForMonth(month);
      const burned = totalExerciseForMonth(month);
      const exerciseCount = exerciseLogsForMonth(month).length;
      return {
        eaten,
        burned,
        net: eaten - burned,
        hasExercise: exerciseCount > 0
      };
    }

    function normalizeWeightNoteType(log) {
      if (log.noteType && weightNoteLabels[log.noteType]) return log.noteType;
      const note = String(log.note || "").trim();
      const match = Object.entries(weightNoteLabels).find(([, label]) => label === note);
      return match ? match[0] : note ? "other" : "normal";
    }

    function formatWeightNote(log) {
      const noteType = normalizeWeightNoteType(log);
      const label = weightNoteLabels[noteType] || weightNoteLabels.normal;
      const note = String(log.note || "").trim();
      if (!note || note === label) return label;
      return `${label} · ${note}`;
    }

    function sortedWeightLogs(desc = true) {
      const logs = [...state.weightLogs];
      return logs.sort((a, b) => {
        const left = `${a.date} ${a.time || "00:00"}`;
        const right = `${b.date} ${b.time || "00:00"}`;
        return desc ? right.localeCompare(left) : left.localeCompare(right);
      });
    }

    function recentFoods(limit = 5) {
      const pinned = [...state.foods]
        .filter((food) => food.isPinnedRecent)
        .sort((a, b) => {
          const pinnedAt = String(b.pinnedRecentAt || "").localeCompare(String(a.pinnedRecentAt || ""));
          if (pinnedAt !== 0) return pinnedAt;
          return a.name.localeCompare(b.name, "th");
        });
      const smart = [...state.foods]
        .filter((food) => food.defaultCalories !== null && food.usageCount > 0)
        .filter((food) => !food.isPinnedRecent)
        .sort((a, b) => {
          const last = String(b.lastUsedAt || "").localeCompare(String(a.lastUsedAt || ""));
          if (last !== 0) return last;
          return (b.usageCount || 0) - (a.usageCount || 0);
        });
      return [...pinned, ...smart].slice(0, limit);
    }

    function sortedFoodSuggestions(query, limit = 8) {
      const q = String(query || "").trim().toLowerCase();
      return [...state.foods]
        .filter((food) => !q || food.name.toLowerCase().includes(q))
        .sort((a, b) => {
          const aRecent = a.lastUsedAt ? new Date(a.lastUsedAt).getTime() : 0;
          const bRecent = b.lastUsedAt ? new Date(b.lastUsedAt).getTime() : 0;
          if (aRecent !== bRecent) return bRecent - aRecent;
          if ((a.usageCount || 0) !== (b.usageCount || 0)) return (b.usageCount || 0) - (a.usageCount || 0);
          if ((a.defaultCalories !== null) !== (b.defaultCalories !== null)) return a.defaultCalories !== null ? -1 : 1;
          return a.name.localeCompare(b.name, "th");
        })
        .slice(0, limit);
    }

    function upsertFoodFromLog(foodId, foodName, calories) {
      const now = nowIso();
      let food = foodId ? state.foods.find((item) => item.id === foodId) : null;
      if (!food) {
        food = state.foods.find((item) => item.name.trim().toLowerCase() === foodName.trim().toLowerCase());
      }

      if (food) {
        food.name = foodName.trim();
        food.defaultCalories = Number(calories);
        food.usageCount = (food.usageCount || 0) + 1;
        food.lastUsedAt = now;
        food.updatedAt = now;
        return food.id;
      }

      const created = {
        id: uid("food"),
        name: foodName.trim(),
        defaultCalories: Number(calories),
        usageCount: 1,
        lastUsedAt: now,
        isStarter: false,
        createdAt: now,
        updatedAt: now
      };
      state.foods.push(created);
      return created.id;
    }

    function touchSelectedAddons(selectedAddons) {
      const now = nowIso();
      selectedAddons.forEach((selected) => {
        const addon = state.foodAddons.find((item) => item.id === selected.addonId);
        if (!addon) return;
        addon.calories = Number(selected.calories);
        addon.usageCount = (addon.usageCount || 0) + 1;
        addon.lastUsedAt = now;
        addon.updatedAt = now;
      });
    }

    function blankSetItem() {
      return {
        id: uid("setitem"),
        foodName: "",
        calories: "",
        quantity: 1
      };
    }

    function normalizeSetItems(items) {
      return (items || [])
        .map((item) => {
          const foodName = String(item.foodName || "").trim();
          const calories = Number(item.calories);
          const quantity = Number(item.quantity);
          return {
            id: item.id || uid("setitem"),
            foodName,
            calories,
            quantity
          };
        })
        .filter((item) => item.foodName || Number.isFinite(item.calories) || Number.isFinite(item.quantity));
    }

    function setItemSubtotal(item) {
      const calories = Number(item.calories);
      const quantity = Number(item.quantity);
      if (!Number.isFinite(calories) || !Number.isFinite(quantity) || calories <= 0 || quantity <= 0) return 0;
      return calories * quantity;
    }

    function setTotalCalories(items) {
      return (items || []).reduce((sum, item) => sum + setItemSubtotal(item), 0);
    }

    function setDisplayName(items) {
      const names = (items || []).map((item) => item.foodName).filter(Boolean);
      if (!names.length) return "เซ็ตอาหาร";
      return `เซ็ตอาหาร: ${names.slice(0, 3).join(" + ")}${names.length > 3 ? " +" : ""}`;
    }

    function upsertSetFoods(items) {
      items.forEach((item) => {
        upsertFoodFromLog(null, item.foodName, item.calories);
      });
    }

    function findFoodByExactName(name) {
      const normalized = String(name || "").trim().toLowerCase();
      if (!normalized) return null;
      return state.foods.find((food) => food.name.trim().toLowerCase() === normalized) || null;
    }

    function renderSetFoodMemoryOptions() {
      return sortedFoodSuggestions("", Math.max(state.foods.length, 20)).map((food) => `
        <option value="${escapeHtml(food.name)}" label="${food.defaultCalories === null ? "ยังไม่มี kcal" : `${food.defaultCalories} kcal`}"></option>
      `).join("");
    }

    function openQuickLog(options = {}) {
      const editing = options.log || null;
      const now = new Date();
      const editingSet = editing && editing.logType === "set";
      runtime.modal = {
        id: editing ? editing.id : null,
        mode: editingSet ? "set" : "quick",
        date: editing ? editing.date : (options.date || dateKey(now)),
        time: editing ? editing.time : timeKey(now),
        mealPeriod: editing ? editing.mealPeriod : inferMealPeriod(timeKey(now)),
        foodId: editing ? (editing.foodId || null) : (options.food ? options.food.id : null),
        foodName: editing ? editing.foodName : (options.food ? options.food.name : ""),
        baseCalories: editing ? String(editing.baseCalories || "") : (options.food && options.food.defaultCalories !== null ? String(options.food.defaultCalories) : ""),
        selectedAddons: editing ? [...(editing.addons || [])] : [],
        setItems: editingSet ? (editing.setItems || []).map((item) => ({ ...item, id: item.id || uid("setitem") })) : [blankSetItem(), blankSetItem()],
        note: editing ? (editing.note || "") : "",
        errors: [],
        shouldFocusFood: true
      };
      renderModal();
    }

    function closeQuickLog() {
      runtime.modal = null;
      renderModal();
    }

    function selectedAddonTotal() {
      if (!runtime.modal) return 0;
      return runtime.modal.selectedAddons.reduce((sum, addon) => sum + (Number(addon.calories) || 0), 0);
    }

    function modalBaseCalories() {
      if (!runtime.modal) return 0;
      return Number(runtime.modal.baseCalories) || 0;
    }

    function modalTotalCalories() {
      if (runtime.modal?.mode === "set") return setTotalCalories(runtime.modal.setItems);
      return modalBaseCalories() + selectedAddonTotal();
    }

    function saveMealFromModal() {
      const modal = runtime.modal;
      if (!modal) return;
      const errors = [];
      if (modal.mode === "set") {
        saveSetMealFromModal(modal);
        return;
      }
      const foodName = modal.foodName.trim();
      const baseCalories = Number(modal.baseCalories);

      if (!modal.date) errors.push("กรุณาเลือกวันที่");
      if (!modal.time) errors.push("กรุณาเลือกเวลา");
      if (!foodName) errors.push("กรุณากรอกชื่ออาหาร");
      if (!Number.isFinite(baseCalories) || baseCalories <= 0) errors.push("กรุณากรอกแคลอรีอาหารหลักเป็นตัวเลขบวก");
      modal.selectedAddons.forEach((addon) => {
        const calories = Number(addon.calories);
        if (!Number.isFinite(calories) || calories <= 0) {
          errors.push(`กรุณากรอกแคลอรีของ ${addon.name}`);
        }
      });

      if (errors.length) {
        modal.errors = errors;
        renderModal();
        return;
      }

      const foodId = upsertFoodFromLog(modal.foodId, foodName, baseCalories);
      const normalizedAddons = modal.selectedAddons.map((addon) => ({
        addonId: addon.addonId,
        name: addon.name,
        calories: Number(addon.calories)
      }));
      touchSelectedAddons(normalizedAddons);

      const now = nowIso();
      const payload = {
        id: modal.id || uid("meal"),
        date: modal.date,
        time: modal.time,
        mealPeriod: modal.mealPeriod || inferMealPeriod(modal.time),
        foodId,
        foodName,
        baseCalories: Number(baseCalories),
        addons: normalizedAddons,
        totalCalories: Number(baseCalories) + normalizedAddons.reduce((sum, addon) => sum + Number(addon.calories || 0), 0),
        note: modal.note.trim(),
        createdAt: modal.id ? (state.mealLogs.find((log) => log.id === modal.id)?.createdAt || now) : now,
        updatedAt: now
      };

      const existingIndex = state.mealLogs.findIndex((log) => log.id === payload.id);
      if (existingIndex >= 0) state.mealLogs[existingIndex] = payload;
      else state.mealLogs.push(payload);

      runtime.selectedDate = payload.date;
      saveState();
      closeQuickLog();
      render();
    }

    function saveSetMealFromModal(modal) {
      const errors = [];
      const items = normalizeSetItems(modal.setItems);
      if (!modal.date) errors.push("กรุณาเลือกวันที่");
      if (!modal.time) errors.push("กรุณาเลือกเวลา");
      if (!items.length) errors.push("กรุณาเพิ่มอาหารอย่างน้อย 1 แถว");
      items.forEach((item, index) => {
        if (!item.foodName) errors.push(`แถวที่ ${index + 1}: กรุณากรอกชื่ออาหาร`);
        if (!Number.isFinite(item.calories) || item.calories <= 0) errors.push(`แถวที่ ${index + 1}: kcal ต้องเป็นตัวเลขบวก`);
        if (!Number.isFinite(item.quantity) || item.quantity <= 0) errors.push(`แถวที่ ${index + 1}: จำนวนต้องเป็นตัวเลขบวก`);
      });

      if (errors.length) {
        modal.errors = errors;
        renderModal();
        return;
      }

      upsertSetFoods(items);
      const now = nowIso();
      const totalCalories = setTotalCalories(items);
      const payload = {
        id: modal.id || uid("meal"),
        logType: "set",
        date: modal.date,
        time: modal.time,
        mealPeriod: modal.mealPeriod || inferMealPeriod(modal.time),
        foodId: null,
        foodName: setDisplayName(items),
        baseCalories: totalCalories,
        addons: [],
        setItems: items.map((item) => ({
          id: item.id,
          foodName: item.foodName,
          calories: Number(item.calories),
          quantity: Number(item.quantity),
          subtotal: setItemSubtotal(item)
        })),
        totalCalories,
        note: modal.note.trim(),
        createdAt: modal.id ? (state.mealLogs.find((log) => log.id === modal.id)?.createdAt || now) : now,
        updatedAt: now
      };

      const existingIndex = state.mealLogs.findIndex((log) => log.id === payload.id);

    function monthDays(month) {
      const [year, monthNum] = month.split("-").map(Number);
      const days = new Date(year, monthNum, 0).getDate();
      return Array.from({ length: days }, (_, index) => `${year}-${pad(monthNum)}-${pad(index + 1)}`);
    }

    function dayStatus(date) {
      const total = totalForDate(date);
      const target = targetCalories();
      if (!total) return "none";
      if (!target) return "under";
      const delta = total - target;
      if (Math.abs(delta) <= 100) return "ok";
      return delta > 0 ? "over" : "under";
    }

    function calendarDates(month) {
      const [year, monthNum] = month.split("-").map(Number);
      const first = new Date(year, monthNum - 1, 1);
      const start = new Date(first);
      start.setDate(first.getDate() - first.getDay());
      return Array.from({ length: 42 }, (_, index) => {
        const date = new Date(start);
        date.setDate(start.getDate() + index);
        return {
          key: dateKey(date),
          day: date.getDate(),
          inMonth: date.getMonth() === monthNum - 1
        };
      });
    }

    function monthlyStats(month) {
      const days = monthDays(month);
      const totals = days.map((day) => ({ day, total: totalForDate(day), status: dayStatus(day) }));
      const logged = totals.filter((item) => item.total > 0);
      const total = logged.reduce((sum, item) => sum + item.total, 0);
      return {
        days,
        totals,
        loggedDays: logged.length,
        total,
        average: logged.length ? Math.round(total / logged.length) : 0,
        within: logged.filter((item) => item.status === "ok").length,
        over: logged.filter((item) => item.status === "over").length,
        under: logged.filter((item) => item.status === "under").length
      };
    }

    function renderExerciseChart(logs) {
      const grouped = logs.reduce((map, log) => {
        const name = log.activityName || "Activity";
        map[name] = (map[name] || 0) + Number(log.caloriesBurned || 0);
        return map;
      }, {});
      const rows = Object.entries(grouped)
        .map(([name, total]) => ({ name, total }))
        .sort((a, b) => b.total - a.total)
        .slice(0, 6);
      const max = Math.max(...rows.map((row) => row.total), 1);
      return `
        <div class="exercise-chart" aria-label="Exercise burn chart">
          ${rows.map((row) => `
            <div class="exercise-bar-row">
              <div class="exercise-bar-label" title="${escapeHtml(row.name)}">${escapeHtml(row.name)}</div>
              <div class="exercise-bar-track">
                <div class="exercise-bar" style="width:${Math.max(3, Math.round((row.total / max) * 100))}%"></div>
              </div>
              <div class="exercise-bar-value">${row.total.toLocaleString()}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderCalorieChart(stats) {
      const target = targetCalories();
      const tdee = state.profile?.tdee || null;
      const max = Math.max(...stats.totals.map((item) => item.total), target || 0, tdee || 0, 1);
      const targetBottom = target ? Math.min(165, Math.max(0, Math.round((target / max) * 160))) : null;
      const tdeeBottom = tdee ? Math.min(165, Math.max(0, Math.round((tdee / max) * 160))) : null;
      return `
        <div class="chart" aria-label="Daily calorie chart">
          ${targetBottom !== null ? `<div class="chart-line" style="bottom:${targetBottom + 26}px"><span class="chart-line-label">Daily target ${target}</span></div>` : ""}
          ${tdeeBottom !== null ? `<div class="chart-line tdee" style="bottom:${tdeeBottom + 26}px"><span class="chart-line-label">TDEE ${tdee}</span></div>` : ""}
          ${stats.totals.map((item, index) => {
            const height = Math.max(2, Math.round((item.total / max) * 150));
            const status = dayStatus(item.day);
            return `
              <div class="bar-wrap" title="${item.day}: ${item.total} kcal">
                <div class="bar ${status}" style="height:${height}px"></div>
                <div class="bar-label">${index + 1}</div>
              </div>
            `;
          }).join("")}
        </div>
        ${(target || tdee) ? `
          <div class="chart-legend">
            ${target ? `<span><span class="legend-mark"></span> Daily target</span>` : ""}
            ${tdee ? `<span><span class="legend-mark tdee"></span> TDEE</span>` : ""}
          </div>
        ` : ""}
      `;
    }

    function renderWeightChart(logs) {
      const values = logs.map((log) => Number(log.weightKg));
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = Math.max(1, max - min);
      const points = logs.map((log, index) => {
        const x = logs.length === 1 ? 50 : 8 + (index / (logs.length - 1)) * 84;
        const y = 86 - ((log.weightKg - min) / range) * 68;
        return `${x},${y}`;
      }).join(" ");
      return `
        <div class="line-chart" aria-label="Weight trend chart">
          <svg viewBox="0 0 100 100" role="img">
            <line x1="8" y1="86" x2="92" y2="86" stroke="var(--line)" stroke-width="0.8" />
            <line x1="8" y1="18" x2="8" y2="86" stroke="var(--line)" stroke-width="0.8" />
            <polyline points="${points}" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
            ${logs.map((log, index) => {
              const point = points.split(" ")[index].split(",");
              return `<circle cx="${point[0]}" cy="${point[1]}" r="2.2" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.4"><title>${log.date}: ${log.weightKg} kg</title></circle>`;
            }).join("")}
            <text x="9" y="13" fill="var(--muted)" font-size="4">${max.toFixed(1)} kg</text>
            <text x="9" y="96" fill="var(--muted)" font-size="4">${min.toFixed(1)} kg</text>
            ${logs.map((log, index) => {
              const shouldShow = logs.length <= 3 || index === 0 || index === logs.length - 1 || index === Math.floor((logs.length - 1) / 2);
              if (!shouldShow) return "";
              const point = points.split(" ")[index].split(",");
              const label = parseDateKey(log.date).toLocaleDateString("th-TH", { day: "numeric", month: "short" });
              return `<text x="${point[0]}" y="93" text-anchor="middle" fill="var(--muted)" font-size="3.3">${label}</text>`;
            }).join("")}
          </svg>
        </div>
      `;
    }

    function renderFoodLibrary() {
      const q = runtime.foodFilter.trim().toLowerCase();
      const foods = [...state.foods]
        .filter((food) => !q || food.name.toLowerCase().includes(q))
        .sort((a, b) => {
          if ((a.usageCount || 0) !== (b.usageCount || 0)) return (b.usageCount || 0) - (a.usageCount || 0);
          return a.name.localeCompare(b.name, "th");
        });
      if (!foods.length) {
        return `<div class="empty-state">ยังไม่มีอาหารที่บันทึก<br>อาหารที่คุณกรอกจะถูกจำไว้ใช้ครั้งต่อไป</div>`;
      }
      return `
        <div class="table-list">
          ${foods.map((food) => `
            <div class="manage-row" data-food-row="${food.id}">
              <input data-food-name value="${escapeHtml(food.name)}" aria-label="Food name">
              <input data-food-calories type="number" min="1" inputmode="numeric" value="${food.defaultCalories === null ? "" : food.defaultCalories}" placeholder="kcal empty">
              <div class="inline-actions">

    function renderAddonLibrary() {
      const q = runtime.addonFilter.trim().toLowerCase();
      const addons = [...state.foodAddons]

        .sort((a, b) => {
          if ((a.usageCount || 0) !== (b.usageCount || 0)) return (b.usageCount || 0) - (a.usageCount || 0);
          return a.name.localeCompare(b.name, "th");
        });
      if (!addons.length) {
        return `<div class="empty-state">ยังไม่มี add-on<br>สร้าง add-on ที่ใช้บ่อยเพื่อบันทึกเร็วขึ้น</div>`;

    function bindAppEvents() {
      document.querySelectorAll("[data-tab]").forEach((button) => {
        button.addEventListener("click", () => {
          runtime.tab = button.dataset.tab;
          render();
        });
      });

      document.querySelectorAll("[data-action]").forEach((el) => {
        const action = el.dataset.action;
        if ([
          "close-log",
          "save-log",
          "pick-food",
          "toggle-addon",
          "select-date",
          "summary-month",
          "profile-gender"
        ].includes(action)) return;
        el.addEventListener("click", (event) => {
          if (action === "toggle-theme") setTheme(state.settings.theme === "dark" ? "light" : "dark");
          if (action === "open-log") openQuickLog();
          if (action === "open-log-date") openQuickLog({ date: runtime.selectedDate });
          if (action === "toggle-history-edit") {
            runtime.historyEditMode = !runtime.historyEditMode;
            render();
          }
          if (action === "quick-food") {
            const food = state.foods.find((item) => item.id === el.dataset.foodId);
            if (food) openQuickLog({ food });
          }
          if (action === "edit-log") {
            const log = state.mealLogs.find((item) => item.id === el.dataset.logId);
            if (log) openQuickLog({ log });
          }
          if (action === "delete-log") deleteMeal(el.dataset.logId);
          if (action === "prev-month") moveCalendar(-1);
          if (action === "next-month") moveCalendar(1);
          if (action === "calendar-date") {
            runtime.selectedDate = el.dataset.date;
            runtime.calendarMonth = monthKey(parseDateKey(el.dataset.date));
            render();
          }
          if (action === "save-food") saveFoodRow(el.dataset.foodId);
          if (action === "delete-food") deleteFood(el.dataset.foodId);
          if (action === "toggle-recent-food") togglePinnedRecentFood(el.dataset.foodId);
          if (action === "add-food-library") addCustomFood();
          if (action === "add-addon") addCustomAddon();
          if (action === "save-addon") saveAddonRow(el.dataset.addonId);
          if (action === "delete-addon") deleteAddon(el.dataset.addonId);
          if (action === "open-weight") openWeightLog();
          if (action === "edit-weight") editWeight(el.dataset.weightId);
          if (action === "delete-weight") deleteWeight(el.dataset.weightId);
          if (action === "delete-exercise") deleteExercise(el.dataset.exerciseId);
          if (action === "reset-data") resetAllData();
          event.preventDefault();
        });
      });

      const selectedDate = document.querySelector("[data-action='select-date']");
      if (selectedDate) {
        selectedDate.addEventListener("change", () => {
          runtime.selectedDate = selectedDate.value || dateKey(new Date());
          runtime.calendarMonth = monthKey(parseDateKey(runtime.selectedDate));
          render();
        });
      }

      const summaryMonth = document.querySelector("[data-action='summary-month']");
      if (summaryMonth) {
        summaryMonth.addEventListener("change", () => {
          runtime.summaryMonth = summaryMonth.value || monthKey(new Date());
          render();
        });
      }

      const exerciseMonth = document.querySelector("[data-action='exercise-month']");
      if (exerciseMonth) {
        exerciseMonth.addEventListener("change", () => {
          runtime.exerciseMonth = exerciseMonth.value || monthKey(new Date());
          render();
        });
      }

      const profileForm = document.getElementById("profileForm");
      if (profileForm) {
        profileForm.addEventListener("submit", (event) => {
          event.preventDefault();
          saveProfileFromForm(profileForm);
        });
      }

      document.querySelectorAll("[data-action='profile-gender']").forEach((button) => {
        button.addEventListener("click", () => {
          const hidden = document.querySelector("input[name='gender']");
          if (hidden) hidden.value = button.dataset.value;
          document.querySelectorAll("[data-action='profile-gender']").forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
        });
      });

      const foodFilter = document.getElementById("foodFilter");
      if (foodFilter) {
        foodFilter.addEventListener("input", () => {
          runtime.foodFilter = foodFilter.value;
          render();
          requestAnimationFrame(() => {
            const next = document.getElementById("foodFilter");
            if (next) {
              next.focus();
              next.setSelectionRange(next.value.length, next.value.length);
            }
          });
        });
      }

      const addonFilter = document.getElementById("addonFilter");
      if (addonFilter) {
        addonFilter.addEventListener("input", () => {
          runtime.addonFilter = addonFilter.value;
          render();
          requestAnimationFrame(() => {
            const next = document.getElementById("addonFilter");
            if (next) {
              next.focus();
              next.setSelectionRange(next.value.length, next.value.length);
            }
          });
        });
      }

      const exerciseForm = document.getElementById("exerciseForm");
      if (exerciseForm) {
        exerciseForm.addEventListener("submit", (event) => {
          event.preventDefault();
          saveExerciseFromForm(exerciseForm);
        });
      }
    }

    function bindModalEvents() {
      const root = document.getElementById("modalRoot");
      root.querySelectorAll("[data-action='close-log']").forEach((button) => button.addEventListener("click", closeQuickLog));
      const save = root.querySelector("[data-action='save-log']");
      if (save) save.addEventListener("click", saveMealFromModal);

      root.querySelectorAll("[data-action='set-log-mode']").forEach((button) => {
        button.addEventListener("click", () => {
          runtime.modal.mode = button.dataset.mode;
          runtime.modal.errors = [];
          runtime.modal.shouldFocusFood = runtime.modal.mode === "quick";
          renderModal();
        });
      });

      const addSetRow = root.querySelector("[data-action='add-set-row']");
      if (addSetRow) {
        addSetRow.addEventListener("click", () => {
          runtime.modal.setItems.push(blankSetItem());
          renderModal();
        });
      }

      root.querySelectorAll("[data-action='remove-set-row']").forEach((button) => {
        button.addEventListener("click", () => {
          const index = Number(button.dataset.setIndex);
          if (runtime.modal.setItems.length <= 1) {
            runtime.modal.setItems = [blankSetItem()];
          } else {
            runtime.modal.setItems.splice(index, 1);
          }
          renderModal();
        });
      });

      root.querySelectorAll("[data-set-field]").forEach((field) => {
        field.addEventListener("input", () => {
          const index = Number(field.dataset.setIndex);
          const key = field.dataset.setField;
          if (runtime.modal.setItems[index]) runtime.modal.setItems[index][key] = field.value;
          if (key === "foodName") applySetFoodMemory(index, field);
          updateModalTotalText();
          updateSetSubtotals();
        });
      });

      root.querySelectorAll("[data-modal-field]").forEach((field) => {
        field.addEventListener("input", () => {
          const key = field.dataset.modalField;
          runtime.modal[key] = field.value;
          if (key === "time") {
            runtime.modal.mealPeriod = inferMealPeriod(field.value);
            const period = document.getElementById("mealPeriod");
            if (period) period.value = runtime.modal.mealPeriod;
          }
          if (key === "foodName") {
            runtime.modal.foodId = null;
            updateSuggestionList(field.value);
          }
          updateModalTotalText();
        });
        field.addEventListener("change", () => {
          const key = field.dataset.modalField;
          runtime.modal[key] = field.value;
          if (key === "time") runtime.modal.mealPeriod = inferMealPeriod(field.value);
          updateModalTotalText();
        });
      });

      root.querySelectorAll("[data-action='pick-food']").forEach((button) => {
        button.addEventListener("click", () => {
          const food = state.foods.find((item) => item.id === button.dataset.foodId);
          if (!food || !runtime.modal) return;
          runtime.modal.foodId = food.id;
          runtime.modal.foodName = food.name;
          runtime.modal.baseCalories = food.defaultCalories === null ? "" : String(food.defaultCalories);
          renderModal();
        });
      });

      root.querySelectorAll("[data-action='toggle-addon']").forEach((checkbox) => {
        checkbox.addEventListener("change", () => {
          const addon = state.foodAddons.find((item) => item.id === checkbox.dataset.addonId);
          if (!addon || !runtime.modal) return;
          const exists = runtime.modal.selectedAddons.find((item) => item.addonId === addon.id);
          if (checkbox.checked && !exists) {
            runtime.modal.selectedAddons.push({
              addonId: addon.id,
              name: addon.name,
              calories: addon.calories === null ? "" : addon.calories
            });
          }
          if (!checkbox.checked) {
            runtime.modal.selectedAddons = runtime.modal.selectedAddons.filter((item) => item.addonId !== addon.id);
          }
          renderModal();
        });
      });

      root.querySelectorAll("[data-addon-calories]").forEach((input) => {
        input.addEventListener("input", () => {
          const selected = runtime.modal.selectedAddons.find((item) => item.addonId === input.dataset.addonCalories);
          if (selected) {
            selected.calories = input.value;
            updateModalTotalText();
          }
        });
      });
    }

    function bindWeightModalEvents() {
      const root = document.getElementById("modalRoot");
      root.querySelectorAll("[data-action='close-weight']").forEach((button) => button.addEventListener("click", closeWeightLog));
      const save = root.querySelector("[data-action='save-weight']");
      if (save) save.addEventListener("click", saveWeightFromModal);

      root.querySelectorAll("[data-weight-modal-field]").forEach((field) => {
        field.addEventListener("input", () => {
          runtime.weightModal[field.dataset.weightModalField] = field.value;
          updateWeightModalSummary();

        field.addEventListener("change", () => {
          runtime.weightModal[field.dataset.weightModalField] = field.value;
          updateWeightModalSummary();
        });
      });

    function updateWeightModalSummary() {
      if (!runtime.weightModal) return;
      const root = document.getElementById("modalRoot");
      const note = root.querySelector(".modal-header .section-note");
      const total = root.querySelector(".modal-footer .item-kcal");
      if (note) note.textContent = `${runtime.weightModal.date ? formatThaiDate(runtime.weightModal.date) : ""} · ${runtime.weightModal.time || ""}`;
      if (total) {
        const weight = Number(runtime.weightModal.weightKg);
        total.textContent = weight > 0 ? `${weight} kg` : "kg";
      }
    }

    function updateSuggestionList(query) {
      const container = document.getElementById("foodSuggestions");
      if (!container) return;
      container.innerHTML = sortedFoodSuggestions(query, query ? 6 : 7).map((food) => `
        <button class="suggestion" data-action="pick-food" data-food-id="${food.id}">
          <div class="name">${escapeHtml(food.name)}</div>
          <div class="meta">${food.defaultCalories === null ? "ยังไม่มี kcal" : `${food.defaultCalories} kcal`} · ใช้ ${food.usageCount || 0} ครั้ง${food.isStarter ? " · starter" : ""}</div>
        </button>
      `).join("");
      container.querySelectorAll("[data-action='pick-food']").forEach((button) => {
        button.addEventListener("click", () => {
          const food = state.foods.find((item) => item.id === button.dataset.foodId);
          if (!food || !runtime.modal) return;
          runtime.modal.foodId = food.id;
          runtime.modal.foodName = food.name;
          runtime.modal.baseCalories = food.defaultCalories === null ? "" : String(food.defaultCalories);
          renderModal();
        });
      });
    }

    function updateModalTotalText() {
      if (!runtime.modal) return;
      const modal = document.getElementById("modalRoot");
      const totals = modal.querySelectorAll(".item-kcal, .modal-header .section-note");
      totals.forEach((item) => {
        if (item.classList.contains("section-note")) {
          item.textContent = `${mealLabels[runtime.modal.mealPeriod] || ""} · Total ${modalTotalCalories() || 0} kcal`;
        } else {
          item.textContent = `${modalTotalCalories() || 0} kcal`;
        }
      });
    }

    function updateSetSubtotals() {
      if (!runtime.modal || runtime.modal.mode !== "set") return;
      document.querySelectorAll("[data-set-row]").forEach((row) => {
        const id = row.dataset.setRow;
        const item = runtime.modal.setItems.find((entry) => entry.id === id);
        const subtotal = row.querySelector(".set-subtotal");
        if (item && subtotal) subtotal.textContent = `${setItemSubtotal(item).toLocaleString()} kcal`;
      });
    }

    function applySetFoodMemory(index, input) {
      const item = runtime.modal?.setItems[index];
      if (!item) return;
      const food = findFoodByExactName(item.foodName);
      if (!food || food.defaultCalories === null) return;

      item.calories = String(food.defaultCalories);
      const row = input.closest("[data-set-row]");
      const caloriesInput = row?.querySelector('[data-set-field="calories"]');
      if (caloriesInput) caloriesInput.value = item.calories;
    }

    function moveCalendar(delta) {
      const [year, month] = runtime.calendarMonth.split("-").map(Number);
      const date = new Date(year, month - 1 + delta, 1);
      runtime.calendarMonth = monthKey(date);
      render();
    }

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && runtime.modal) closeQuickLog();
      if (event.key === "Escape" && runtime.weightModal) closeWeightLog();
    });

    applyTheme();
    saveState();
    render();
  </script>
</body>
</html>
